substitutions:
  name: neato-vacuum # If you want another name, change it here, remeber to replace it in the ha-card.yaml!
  comment: "" # If you want to write a comment about this vacuum, do so here. e.g. "Downstairs garage vacuum"

  infointerval: 2sec
  chargerinterval: 2min

  ota_password: !secret neato_vacuum_ota

  ### If you are using ha:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ha_encryption_key: !secret neato_vacuum_api

  ### If you want to change the UART Pins
  uart_tx: 12
  uart_rx: 13


wifi:
  ## If your router sets another TLD for local devices, specify that here
  domain: .lan
  ## If you are having issues with the dns or are 100% this will be the ip, you can spesify that here
  use_address: 192.168.205.199




packages:
  - !include boards/esp32.yaml
  # - !include boards/esp32c3.yaml
  # - !include boards/esp32s3.yaml
  # - !include boards/esp32s2.yaml

  - !include ha.yaml             # Remember to set wifi credentials and ha_encryption_key in the substitutions if you are using this
  # - !include no-ha.yaml

  - !include webserver.yaml
  - !include gen3.yaml
  # - !include gen2.yaml