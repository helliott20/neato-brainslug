substitutions:
  time_platform: homeassistant

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

api:
  encryption:
    key: ${ha_encryption_key}

  actions:
    - action: send_cmd
      variables:
        command: string
      then:
        - uart.write: !lambda |-
            // Convert to std::string
            std::string s = command;

            // IMPORTANT: keep newline exactly like YAML version
            if (s.empty() || s.back() != '\n')
              s += "\n";

            // convert string → vector<uint8_t>
            return std::vector<uint8_t>(s.begin(), s.end());

    - action: play_sound
      variables:
        soundid: int
      then:
        - uart.write: !lambda |-
            // Create std::string
            std::string s = "PlaySound SoundId " + std::to_string(soundid) + "\n";
            // convert string → vector<uint8_t>
            return std::vector<uint8_t>(s.begin(), s.end());

    - action: lidar_scan
      then:
        - script.execute: lidar_scan

    - action: lidar_scan_continuous
      then:
        - script.execute: lidar_scan_continuous

    - action: lidar_stop
      then:
        - script.execute: lidar_stop

    - action: set_nogo_zones
      variables:
        zones_json: string
      then:
        - lambda: !lambda |-
            id(g_nogo_zones) = zones_json;
            id(nogo_zones_text).publish_state(zones_json.c_str());
            id(nogoZonesData).publish_state(zones_json.c_str());
            ESP_LOGI("nogo", "Zones set via HA: %s", zones_json.c_str());


